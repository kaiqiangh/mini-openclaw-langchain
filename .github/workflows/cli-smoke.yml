name: CLI Smoke

on:
  pull_request:
    paths:
      - "oml"
      - "oml.ps1"
      - "cli/oml/**"
      - "cli/tests/**"
      - "README.md"
      - ".github/workflows/cli-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "oml"
      - "oml.ps1"
      - "cli/oml/**"
      - "cli/tests/**"
      - "README.md"
      - ".github/workflows/cli-smoke.yml"
  workflow_dispatch:

concurrency:
  group: cli-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-smoke:
    name: CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate POSIX CLI smoke checks
        run: bash cli/tests/cli/test_oml_smoke.sh
