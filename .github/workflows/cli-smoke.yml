name: CLI Smoke

on:
  pull_request:
    paths:
      - 'oml'
      - 'oml.ps1'
      - 'cli/oml/**'
      - 'cli/tests/**'
      - 'README.md'
      - '.github/workflows/cli-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'oml'
      - 'oml.ps1'
      - 'cli/oml/**'
      - 'cli/tests/**'
      - 'README.md'
      - '.github/workflows/cli-smoke.yml'
  workflow_dispatch:

concurrency:
  group: cli-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-smoke:
    name: CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate POSIX CLI smoke checks
        if: matrix.os != 'windows-latest'
        run: bash cli/tests/cli/test_oml_smoke.sh

      - name: Validate PowerShell CLI smoke checks
        if: matrix.os == 'windows-latest'
        shell: pwsh -NoLogo -NoProfile -File {0}
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-Oml {
            param(
              [Parameter(Mandatory = $true)][string]$OutFile,
              [Parameter(ValueFromRemainingArguments = $true)][string[]]$Args
            )

            & pwsh -NoLogo -NoProfile -File .\oml.ps1 @Args *> $OutFile
            $code = $LASTEXITCODE
            $text = Get-Content $OutFile -Raw
            return [pscustomobject]@{
              Code = $code
              Text = $text
              OutFile = $OutFile
              Args = $Args
            }
          }

          $r = Invoke-Oml -OutFile 'oml-help.out' help
          if ($r.Code -ne 0) {
            throw "help command failed (exit $($r.Code))`n--- output ---`n$($r.Text)"
          }
          if ($r.Text -notmatch 'Usage:' -or $r.Text -notmatch 'oml\.ps1') {
            throw "help output missing usage`n$($r.Text)"
          }
          if ($r.Text -notmatch 'start \[all\|backend\|frontend\]') {
            throw "help output missing start command`n$($r.Text)"
          }

          $r = Invoke-Oml -OutFile 'oml-version.out' version
          if ($r.Code -ne 0) {
            throw "version command failed (exit $($r.Code))`n--- output ---`n$($r.Text)"
          }
          if ($r.Text -notmatch 'oml:') {
            throw "version output missing oml version`n$($r.Text)"
          }
          if ($r.Text -notmatch 'backend_api:') {
            throw "version output missing backend version`n$($r.Text)"
          }
          if ($r.Text -notmatch 'frontend:') {
            throw "version output missing frontend version`n$($r.Text)"
          }

          $r = Invoke-Oml -OutFile 'oml-ports.out' ports
          if ($r.Code -ne 0) {
            throw "ports command failed (exit $($r.Code))`n--- output ---`n$($r.Text)"
          }

          $r = Invoke-Oml -OutFile 'oml-invalid.out' does-not-exist
          if ($r.Code -eq 0) {
            throw "invalid command unexpectedly succeeded`n$($r.Text)"
          }
          if ($r.Text -notmatch 'Unknown command') {
            throw "invalid command output missing expected message`n$($r.Text)"
          }
