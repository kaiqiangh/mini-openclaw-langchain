services:
  nginx:
    profiles: ["prod"]
    image: nginxinc/nginx-unprivileged:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${STACK_PUBLIC_PORT:-8080}:8080"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_ENABLE_FRONTEND_PROXY: "false"
    expose:
      - "8000"
    volumes:
      - backend_workspaces:/app/workspaces
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_ENABLE_FRONTEND_PROXY: "false"
      APP_TRUSTED_HOSTS: "${APP_TRUSTED_HOSTS:-localhost,127.0.0.1,*.localhost},backend-dev"
    ports:
      - "${BACKEND_DEV_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    command: ["npx", "next", "dev", "-H", "0.0.0.0", "-p", "3000"]
    environment:
      NODE_ENV: development
      NEXT_DEV_API_PROXY_URL: http://backend-dev:8000
    depends_on:
      backend-dev:
        condition: service_healthy
    ports:
      - "${FRONTEND_DEV_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  backend_workspaces:
  frontend_node_modules:
  frontend_next:
